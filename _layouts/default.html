<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
  <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <!-- Reading Progress Bar -->
  <div id="progress-bar"></div>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <h1 class="project-name">{{ site.title | default: "OpenClaw 实战教程" }}</h1>
      <h2 class="project-tagline">{{ site.description | default: "" }}</h2>
      <a href="{{ '/' | relative_url }}" class="btn">首页</a>
      <a href="https://github.com/zxk-git/openclaw-tutorial" class="btn">GitHub</a>
    </div>
  </header>

  <!-- Search + Theme Toggle -->
  <div class="toolbar">
    <div class="search-container" id="search-box">
      <input type="text" id="search-input" placeholder="🔍 搜索章节..." autocomplete="off" />
      <div id="search-results"></div>
    </div>
    <button id="theme-toggle" title="切换暗色/亮色模式" aria-label="Toggle dark mode">🌙</button>
  </div>

  <!-- Chapter Navigation Bar (shown on chapter pages) -->
  <nav id="chapter-nav" class="chapter-nav" style="display:none">
    <a id="nav-prev" class="nav-link nav-prev" href="#">← 上一章</a>
    <span id="nav-current" class="nav-current"></span>
    <a id="nav-next" class="nav-link nav-next" href="#">下一章 →</a>
  </nav>

  <!-- Main content -->
  <main class="main-content">
    <div class="markdown-body">
      {{ content }}
    </div>
  </main>

  <!-- Back to Top -->
  <button id="back-to-top" title="回到顶部" aria-label="Back to top">↑</button>

  <!-- Footer -->
  <footer class="site-footer">
    <span class="site-footer-credits">
      Powered by <a href="https://pages.github.com">GitHub Pages</a> &middot;
      Pipeline v5.5 &middot; 25 章 &middot; 118,612 字 &middot; 全部 100 分
    </span>
  </footer>

  <script>
  // === Chapter data ===
  var CH = [
    { n: 1,  t: "OpenClaw 基础介绍与安装", u: "01-基础介绍与安装" },
    { n: 2,  t: "部署与环境初始化", u: "02-部署与环境初始化" },
    { n: 3,  t: "Skills 插件体系与批量开发", u: "03-Skills 插件体系与批量开发" },
    { n: 4,  t: "Skills 安装与管理实践", u: "04-Skills 安装与管理实践" },
    { n: 5,  t: "ClawHub 平台与技能分发", u: "05-ClawHub 平台与技能分发" },
    { n: 6,  t: "自动化命令与脚本集成", u: "06-自动化命令与脚本集成" },
    { n: 7,  t: "飞书集成与消息自动化", u: "07-飞书集成与消息自动化" },
    { n: 8,  t: "单 Gateway 多 Agent 配置与管理", u: "08-单 Gateway 多 Agent 配置与管理" },
    { n: 9,  t: "故障排查与日志分析", u: "09-故障排查与日志分析" },
    { n: 10, t: "持续集成与知识库同步", u: "10-持续集成与知识库同步" },
    { n: 11, t: "高级场景：第三方平台集成", u: "11-高级场景-第三方平台集成" },
    { n: 12, t: "实践案例与常见问题", u: "12-实践案例与常见问题" },
    { n: 13, t: "教程自动更新与仓库维护", u: "13-教程自动更新与仓库维护" },
    { n: 14, t: "安全与权限管理", u: "14-安全与权限管理" },
    { n: 15, t: "Memory 记忆系统深入", u: "15-Memory 记忆系统深入" },
    { n: 16, t: "MCP 工具协议与自定义集成", u: "16-MCP 工具协议与自定义集成" },
    { n: 17, t: "浏览器自动化与网页交互", u: "17-浏览器自动化与网页交互" },
    { n: 18, t: "性能优化与规模化部署", u: "18-性能优化与规模化部署" },
    { n: 19, t: "团队协作与企业部署", u: "19-团队协作与企业部署" },
    { n: 20, t: "OpenClaw 生态与未来展望", u: "20-OpenClaw 生态与未来展望" },
    { n: 21, t: "多飞书多 Agent 实战配置", u: "21-多飞书多 Agent 实战配置" },
    { n: 22, t: "Canvas 可视化交互", u: "22-Canvas 可视化交互" },
    { n: 23, t: "Agent 人格与行为设计", u: "23-Agent 人格与行为设计" },
    { n: 24, t: "多模态与媒体处理", u: "24-多模态与媒体处理" },
    { n: 25, t: "进阶开发实践", u: "25-进阶开发实践" }
  ];

  // === Dark mode toggle ===
  (function() {
    var toggle = document.getElementById('theme-toggle');
    if (document.documentElement.getAttribute('data-theme') === 'dark') toggle.textContent = '☀️';
    toggle.addEventListener('click', function() {
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
        toggle.textContent = '🌙';
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
        toggle.textContent = '☀️';
      }
    });
  })();

  // === Chapter search ===
  (function() {
    var input = document.getElementById('search-input');
    var box = document.getElementById('search-results');
    input.addEventListener('input', function() {
      var q = this.value.trim().toLowerCase();
      box.innerHTML = '';
      if (!q) { box.style.display = 'none'; return; }
      var hits = CH.filter(function(c){ return c.t.toLowerCase().indexOf(q) !== -1 || ('第'+c.n+'章').indexOf(q) !== -1; });
      if (!hits.length) {
        box.innerHTML = '<div class="sr-empty">没有匹配的章节</div>';
      } else {
        hits.forEach(function(c){
          var a = document.createElement('a');
          a.href = c.u + '.html';
          a.textContent = '第 ' + c.n + ' 章：' + c.t;
          a.className = 'sr-item';
          box.appendChild(a);
        });
      }
      box.style.display = 'block';
    });
    document.addEventListener('click', function(e){
      if (!document.getElementById('search-box').contains(e.target)) box.style.display = 'none';
    });
  })();

  // === Chapter navigation ===
  (function() {
    var path = decodeURIComponent(window.location.pathname);
    var match = path.match(/(\d{2})-/);
    if (!match) return; // Not a chapter page
    var num = parseInt(match[1], 10);
    var idx = CH.findIndex(function(c){ return c.n === num; });
    if (idx === -1) return;
    var nav = document.getElementById('chapter-nav');
    var prev = document.getElementById('nav-prev');
    var curr = document.getElementById('nav-current');
    var next = document.getElementById('nav-next');
    nav.style.display = 'flex';
    curr.textContent = '第 ' + num + ' 章 / 25';
    if (idx > 0) {
      prev.href = CH[idx-1].u + '.html';
      prev.textContent = '← ' + CH[idx-1].t;
    } else {
      prev.style.visibility = 'hidden';
    }
    if (idx < CH.length - 1) {
      next.href = CH[idx+1].u + '.html';
      next.textContent = CH[idx+1].t + ' →';
    } else {
      next.style.visibility = 'hidden';
    }
  })();

  // === Reading progress bar ===
  (function() {
    var bar = document.getElementById('progress-bar');
    window.addEventListener('scroll', function() {
      var h = document.documentElement.scrollHeight - window.innerHeight;
      var pct = h > 0 ? (window.scrollY / h * 100) : 0;
      bar.style.width = pct + '%';
    });
  })();

  // === Back to top ===
  (function() {
    var btn = document.getElementById('back-to-top');
    window.addEventListener('scroll', function() {
      btn.style.display = window.scrollY > 400 ? 'block' : 'none';
    });
    btn.addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  })();
  </script>
</body>
</html>
